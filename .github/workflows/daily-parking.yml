name: Daily parking

on:
  # GitHub Actions cron uses UTC, not Denmark time.
  #
  # Denmark summer time, CEST:
  #   22:12 UTC = 00:12 Copenhagen
  #
  # Denmark winter time, CET:
  #   23:12 UTC = 00:12 Copenhagen
  #
  # Multiple attempts are used because GitHub scheduled workflows can be
  # delayed or sometimes skipped. The script is idempotent, so duplicate
  # runs are okay if the car is already registered.
  schedule:
    - cron: "12,27,42,57 22 * * *"
    - cron: "12,27,42,57 23 * * *"
    # Extra fallback: runs later in the night if GitHub missed the midnight window.
    - cron: "12,42 0 * * *"

  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: parking
  cancel-in-progress: true

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      REGISTRATIONS: ${{ secrets.REGISTRATIONS }}
      HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Ensure Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Register parking
        run: |
          set -o pipefail
          python parking.py | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}-${{ github.run_attempt }}
          path: trace.zip
          if-no-files-found: ignore
          retention-days: 14

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK is not set, skipping Discord notification."
            exit 0
          fi

          curl -sS -H "Content-Type: application/json" \
            --data '{"content":"Daily parking run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$DISCORD_WEBHOOK"
