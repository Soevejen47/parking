name: Daily parking

on:
  # Two crons to cover DST: 22:05 UTC = 00:05 Copenhagen in summer (CEST),
  # 23:05 UTC = 00:05 Copenhagen in winter (CET). The "wrong" one runs an
  # hour before midnight local time and either no-ops (portal still serves
  # the previous day's permit -> "allerede registreret" path) or registers
  # early; the script is idempotent either way, so a duplicate run is safe.
  schedule:
    - cron: "5 22 * * *"
    - cron: "5 23 * * *"
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

# Least privilege -- this workflow only reads the repo's code.
permissions:
  contents: read

# If a previous run is still going (rare, but possible if a step hangs),
# cancel it so we never have two concurrent registrations.
concurrency:
  group: parking
  cancel-in-progress: true

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      REGISTRATIONS: ${{ secrets.REGISTRATIONS }}
      HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Cache the Chromium binary across runs -- saves ~30s/run since the
      # browser download is ~150MB. The cache key is keyed on requirements.txt
      # so a Playwright version bump invalidates it automatically.
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      # System deps (apt packages) aren't cached -- run install-deps every
      # time so the cached browser binary still has its libraries.
      - name: Ensure Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Register parking
        run: |
          set -o pipefail
          python parking.py | tee -a "$GITHUB_STEP_SUMMARY"

      # On failure (script crash or any per-plate failure), upload the
      # Playwright trace so it can be opened with `playwright show-trace`.
      # The trace is only written by parking.py when something went wrong,
      # so on green runs there's nothing to upload.
      - name: Upload Playwright trace
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}-${{ github.run_attempt }}
          path: trace.zip
          if-no-files-found: ignore
          retention-days: 14

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -sS -H "Content-Type: application/json" \
            --data '{"content":"Daily parking run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
            "$DISCORD_WEBHOOK"
