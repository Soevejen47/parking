name: Daily parking

on:
  # 23:05 UTC = 00:05 Copenhagen (winter) / 01:05 (summer).
  # Always just past local midnight, when a new daily permit can be claimed.
  schedule:
    - cron: "5 23 * * *"
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

# If a previous run is still going (rare, but possible if a step hangs),
# cancel it so we never have two concurrent registrations.
concurrency:
  group: parking
  cancel-in-progress: true

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      LICENSE_PLATE: ${{ vars.LICENSE_PLATE }}
      HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Register parking
        run: python parking.py
